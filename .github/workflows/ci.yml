# CI Pipeline — validates code quality on every PR.
# STATUS: INACTIVE (workflow_dispatch only). Change trigger to push/pull_request when ready.
name: CI

on:
  workflow_dispatch:
  # Uncomment below to activate:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
